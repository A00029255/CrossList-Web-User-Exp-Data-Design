<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <nav class="navbar">
    <a href="index.html">Homepage</a>
    <a href="products.html">Products</a>
    <a href="about_us.html">About</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact_us.html">Contact</a>
  </nav>

  <!-- FILTER -->
  <section class="categories">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('phone')">Phones</button>
    <button onclick="filterProducts('laptop')">Laptops</button>
    <button onclick="filterProducts('headphone')">Headphones</button>
  </section>

  <!-- SEARCH -->
  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
  </section>

  <h2>Our Products</h2>

  <div class="product-container" id="productList"></div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://eehtvevnukdhrwudlmat.supabase.co",
      "sb_publishable_P9yhIU_CzvEePe9KujiJpg_zACInFVc"
    );

    let allProducts = [];
    let currentFilter = "all";

    async function loadProducts() {
      const { data, error } = await supabaseClient
        .from("products")
        .select("*");

      if (error) return;

      allProducts = data || [];
      displayProducts(allProducts);
    }

    function displayProducts(products) {
      const container = document.getElementById("productList");
      container.innerHTML = "";

      products.forEach(p => {

        container.innerHTML += `
          <div class="product-card" data-category="${p.category}">
            <img src="${p.image_url || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80'}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="addToCart('${p.name}')">Add to Cart</button>
          </div>
        `;
      });
    }

    function filterProducts(category) {
      currentFilter = category;
      applyFilters();
    }

    function searchProducts() {
      applyFilters();
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allProducts.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(search);
        const matchesCategory =
          currentFilter === "all" || p.category === currentFilter;

        return matchesSearch && matchesCategory;
      });

      displayProducts(filtered);
    }

    function addToCart(name) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push(name);
      localStorage.setItem("cart", JSON.stringify(cart));
      alert(name + " added to cart!");
    }

    // 🔥 HASH FILTER (THIS IS THE IMPORTANT PART)
    function applyHashFilter() {
      const hash = window.location.hash.replace("#", "").toLowerCase();

      if (hash === "iphone") {
        filterProducts("phone");
      }

      if (hash === "laptop") {
        filterProducts("laptop");
      }

      if (hash === "headphones") {
        filterProducts("headphone");
      }
    }

    window.onload = async function () {
      await loadProducts();
      applyHashFilter();
    };
  </script>

</body>
</html>
