<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products</title>

  <link rel="stylesheet" href="style.css" />

  <!-- IMPORTANT: Supabase library MUST be loaded first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html">Homepage</a>
    <a href="products.html">Products</a>
    <a href="about_us.html">About</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact_us.html">Contact</a>
  </nav>

  <!-- FILTER -->
  <section class="categories">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('phone')">Phones</button>
    <button onclick="filterProducts('laptop')">Laptops</button>
    <button onclick="filterProducts('tablet')">Tablets</button>
    <button onclick="filterProducts('headphone')">Headphones</button>
    <button onclick="filterProducts('smartwatch')">Smartwatches</button>
    <button onclick="filterProducts('accessorie')">Accessories</button>
  </section>

  <!-- SEARCH -->
  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
  </section>

  <!-- TITLE -->
  <section class="products">
    <h2>Our Products</h2>
  </section>

  <!-- PRODUCT CONTAINER (MUST BE INSIDE BODY) -->
  <div class="product-container" id="productList"></div>

  <script>
    // CREATE SUPABASE CLIENT
    const supabaseClient = supabase.createClient(
      "https://eehtvevnukdhrwudlmat.supabase.co",
      "sb_publishable_P9yhIU_CzvEePe9KujiJpg_zACInFVc"
    );

    let allProducts = [];
    let currentFilter = "all";

    // LOAD PRODUCTS
    async function loadProducts() {
      const { data, error } = await supabaseClient
        .from("products")
        .select("*");

      console.log("Supabase data:", data);
      console.log("Supabase error:", error);

      if (error) return;

      allProducts = data || [];
      displayProducts(allProducts);
    }

    // DISPLAY PRODUCTS
    function displayProducts(products) {
      const container = document.getElementById("productList");

      if (!container) {
        console.error("productList not found");
        return;
      }

      container.innerHTML = "";

      products.forEach(p => {
        container.innerHTML += `
          <div class="product-card" data-category="${p.category}">
            <img src="${p.image_url || 'https://via.placeholder.com/200'}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>€${p.price}</p>
            <button onclick="addToCart('${p.name}')">Add to Cart</button>
          </div>
        `;
      });
    }

    // FILTER
    function filterProducts(category) {
      currentFilter = category;
      applyFilters();
    }

    // SEARCH
    function searchProducts() {
      applyFilters();
    }

    // APPLY FILTERS + SEARCH
    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allProducts.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(search);
        const matchesCategory =
          currentFilter === "all" || p.category === currentFilter;

        return matchesSearch && matchesCategory;
      });

      displayProducts(filtered);
    }

    // CART
    function addToCart(name) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push(name);
      localStorage.setItem("cart", JSON.stringify(cart));

      alert(name + " added to cart!");
    }

    // START PAGE AFTER EVERYTHING LOADS
    window.onload = loadProducts;
  </script>

</body>
</html>
